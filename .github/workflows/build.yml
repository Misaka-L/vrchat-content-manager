name: Build
on:
  workflow_call:
    inputs:
      ref:
        type: string
        description: git ref to build
        default: ${{ github.ref_name }}
      sentry-environment:
        type: string
        description: Environment name to use for Sentry
        default: snapshot
  push:
    paths:
      - src/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - src/**
      - .github/workflows/build.yml

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            target-framework: net10.0-windows10.0.17763.0
          - os: ubuntu-latest
            rid: linux-x64
            target-framework: net10.0

    runs-on: ${{ matrix.os }}

    env:
      repo_dir: ${{ github.workspace }}/repo
      src_dir: ${{ github.workspace }}/repo/src
      output_dir: ${{ github.workspace }}/artifacts/unpacked-portable-${{ matrix.rid }}
      app_cache_key: build-app-${{ github.run_id }}-${{ matrix.rid }}
      sentry_environment: ${{ case(github.event == 'workflow_call', inputs.sentry-environment, 'snapshot') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          path: ${{ env.repo_dir }}
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        env:
          RID: ${{ matrix.rid }}
          BUILD_OUTPUT_DIR: ${{ env.output_dir }}
          TARGET_FRAMEWORK: ${{ matrix.target-framework }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: dotnet publish -c Release App/VRChatContentPublisher.App -r $RID -o $BUILD_OUTPUT_DIR -f $TARGET_FRAMEWORK -p:SentryDsn=$SENTRY_DSN -p:SentryEnvironment=$sentry_environment
        shell: bash
        working-directory: ${{ env.src_dir }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vrchat-content-publisher-only-app-${{ matrix.rid }}
          path: |
            ${{ env.output_dir }}
            !${{ env.output_dir }}/**/*.pdb
            !${{ env.output_dir }}/**/*.dbg

      - name: Upload PDB
        uses: actions/upload-artifact@v7
        with:
          name: pdb-app-${{ matrix.rid }}
          path: |
            ${{ env.output_dir }}/**/*.pdb
            ${{ env.output_dir }}/**/*.dbg

      - name: Remove PDB From Portable Output
        shell: bash
        run: |
          set -euo pipefail
          find "${{ env.output_dir }}" -type f \( -name "*.pdb" -o -name "*.dbg" \) -delete

      - name: Save App Build Cache
        uses: actions/cache/save@v5
        with:
          key: ${{ env.app_cache_key }}
          path: artifacts/unpacked-portable-${{ matrix.rid }}
          enableCrossOsArchive: true

  build-crash-handler:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    env:
      repo_dir: ${{ github.workspace }}/repo
      src_dir: ${{ github.workspace }}/repo/src
      output_dir: ${{ github.workspace }}/artifacts/unpacked-portable-${{ matrix.rid }}/CrashHandler
      crash_cache_key: build-crash-handler-${{ github.run_id }}-${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          path: ${{ env.repo_dir }}
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        env:
          RID: ${{ matrix.rid }}
          BUILD_OUTPUT_DIR: ${{ env.output_dir }}
        run: dotnet publish -c Release App/CrashHandler/VRChatContentPublisher.CrashHandler.App -r $RID -o $BUILD_OUTPUT_DIR
        shell: bash
        working-directory: ${{ env.src_dir }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vrchat-content-publisher-crash-handler-${{ matrix.rid }}
          path: |
            ${{ env.output_dir }}
            !${{ env.output_dir }}/**/*.pdb
            !${{ env.output_dir }}/**/*.dbg

      - name: Upload PDB
        uses: actions/upload-artifact@v7
        with:
          name: pdb-crash-handler-${{ matrix.rid }}
          path: |
            ${{ env.output_dir }}/**/*.pdb
            ${{ env.output_dir }}/**/*.dbg

      - name: Remove PDB From Crash Handler Output
        shell: bash
        run: |
          set -euo pipefail
          find "${{ env.output_dir }}" -type f \( -name "*.pdb" -o -name "*.dbg" \) -delete

      - name: Save Crash Handler Build Cache
        uses: actions/cache/save@v5
        with:
          key: ${{ env.crash_cache_key }}
          path: artifacts/unpacked-portable-${{ matrix.rid }}/CrashHandler
          enableCrossOsArchive: true

  merge-artifacts:
    strategy:
      matrix:
        include:
          - rid: win-x64
          - rid: linux-x64

    needs: [build, build-crash-handler]
    runs-on: ubuntu-latest

    env:
      artifact_dir: ${{ github.workspace }}/artifacts/unpacked-portable-${{ matrix.rid }}
      output_dir: ${{ github.workspace }}/output
      app_cache_key: build-app-${{ github.run_id }}-${{ matrix.rid }}
      crash_cache_key: build-crash-handler-${{ github.run_id }}-${{ matrix.rid }}
      merged_cache_key: merged-release-input-${{ github.run_id }}-${{ matrix.rid }}

    steps:
      - name: Restore App Build Cache
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.app_cache_key }}
          path: artifacts/unpacked-portable-${{ matrix.rid }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Restore Crash Handler Build Cache
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.crash_cache_key }}
          path: artifacts/unpacked-portable-${{ matrix.rid }}/CrashHandler
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Upload Merged Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: unpacked-portable-${{ matrix.rid }}
          path: ${{ env.artifact_dir }}

      - name: Save Merged Release Input Cache
        uses: actions/cache/save@v5
        with:
          key: ${{ env.merged_cache_key }}
          path: artifacts/unpacked-portable-${{ matrix.rid }}
          enableCrossOsArchive: true

  make-windows-installer-inno:
    needs: merge-artifacts
    runs-on: windows-latest

    env:
      repo_dir: ${{ github.workspace }}/repo
      installer_script_path: ${{ github.workspace }}/repo/distribution/windows-installer-inno/installer.iss
      installer_output_dir: ${{ github.workspace }}/artifacts/installer-win-x64
      installer_output_base_name: vrchat-content-publisher-installer
      artifact_dir: ${{ github.workspace }}/artifacts/unpacked-portable-win-x64
      executable_name: VRChatContentPublisher.App.exe
      installer_product_version: ""
      merged_cache_key: merged-release-input-${{ github.run_id }}-win-x64
      installer_cache_key: installer-win-x64-${{ github.run_id }}

    steps:
      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: pwsh

      - name: Restore Build Artifacts Cache
        id: restore-merged-cache
        uses: actions/cache/restore@v5
        with:
          key: ${{ env.merged_cache_key }}
          path: artifacts/unpacked-portable-win-x64
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Get Version Info
        id: get-version-info
        shell: powershell
        working-directory: ${{ env.artifact_dir }}
        run: |
          "installer_product_version=" + (Get-Item ${{ env.executable_name }} | Select-Object -ExpandProperty VersionInfo | Select-Object -ExpandProperty ProductVersion) >> $Env:GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          path: ${{ env.repo_dir }}

      - name: Build Installer
        run: iscc /O"${{ env.installer_output_dir }}" /F"${{ env.installer_output_base_name }}" /DMyAppVersion=${{ env.installer_product_version }} /DAppArtifactPath="${{ env.artifact_dir }}" ${{ env.installer_script_path }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-win-x64
          path: ${{ env.installer_output_dir }}/${{ env.installer_output_base_name }}.exe

      - name: Save Installer Cache
        uses: actions/cache/save@v5
        with:
          key: ${{ env.installer_cache_key }}
          path: artifacts/installer-win-x64
          enableCrossOsArchive: true
